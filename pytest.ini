[pytest]
testpaths = tests

addopts = 
    -v
    --strict-markers
    --tb=short
    # Temporarily disabled until pytest-cov is properly detected
    # --cov=services
    # --cov-report=term-missing
    # --cov-report=html
    # --cov-fail-under=80

markers = 
    unit: Units tests
    integration: Integration tests
    slow: Slow tests
    auth: Authentication tests
    vision: Vision tests

asyncio_mode = auto
        