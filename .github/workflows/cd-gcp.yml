name: CD — Deploy to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Servicio a desplegar (o 'all')"
        required: true
        default: "all"
        type: choice
        options: [all, api-gateway, vision-service, translation-service]

concurrency:
  group: cd-gcp-${{ github.ref }}
  cancel-in-progress: false

# ── Variables globales ─────────────────────────────────────────────────────────
env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'signspeak-prod' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  IMAGE_TAG: ${{ github.sha }}
  HF_MODEL_REPO: ${{ vars.HF_MODEL_REPO || 'alanctinaDev/signspeak-models' }}

# =============================================================================
# JOB 1 — Detectar qué servicios cambiaron
# =============================================================================
jobs:
  changes:
    name: "🔍 Detectar cambios"
    runs-on: ubuntu-latest
    outputs:
      api_gateway: ${{ steps.filter.outputs.api_gateway }}
      vision_service: ${{ steps.filter.outputs.vision_service }}
      translation_service: ${{ steps.filter.outputs.translation_service }}
    steps:
      - uses: actions/checkout@v4

      - name: Filtrar cambios por servicio
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api_gateway:
              - 'services/api_gateway/**'
            vision_service:
              - 'services/vision_service/**'
            translation_service:
              - 'services/translation_service/**'

  # =============================================================================
  # JOB 2 — Autenticar con GCP
  # =============================================================================
  auth:
    name: "🔐 Autenticar GCP"
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.api_gateway == 'true' ||
      needs.changes.outputs.vision_service == 'true' ||
      needs.changes.outputs.translation_service == 'true' ||
      github.event_name == 'workflow_dispatch'
    outputs:
      registry: ${{ steps.registry.outputs.registry }}
    steps:
      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Guardar URL del registry
        id: registry
        run: echo "registry=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak" >> $GITHUB_OUTPUT

  # =============================================================================
  # JOB 3a — Build y Deploy vision-service
  # =============================================================================
  deploy-vision:
    name: "🐳 Deploy vision-service"
    runs-on: ubuntu-latest
    needs: [changes, auth]
    if: |
      needs.changes.outputs.vision_service == 'true' ||
      github.event.inputs.service == 'vision-service' ||
      github.event.inputs.service == 'all'
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build y Push — vision-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/vision_service
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak/vision-service:${{ env.IMAGE_TAG }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak/vision-service:latest

      - name: Deploy a Cloud Run — vision-service
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: vision-service
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak/vision-service:${{ env.IMAGE_TAG }}
          env_vars: |
            HF_MODEL_REPO=${{ env.HF_MODEL_REPO }}
            HF_TOKEN=${{ secrets.HF_TOKEN }}
            ENVIRONMENT=production
            LOG_LEVEL=INFO
          flags: |
            --memory=2Gi
            --cpu=2
            --timeout=300
            --min-instances=0
            --max-instances=3
            --allow-unauthenticated

      - name: Mostrar URL
        run: echo "✅ vision-service → ${{ steps.deploy.outputs.url }}"

  # =============================================================================
  # JOB 3b — Build y Deploy translation-service
  # =============================================================================
  deploy-translation:
    name: "🐳 Deploy translation-service"
    runs-on: ubuntu-latest
    needs: [changes, auth, deploy-vision]
    if: |
      always() && !cancelled() &&
      (needs.changes.outputs.translation_service == 'true' ||
      github.event.inputs.service == 'translation-service' ||
      github.event.inputs.service == 'all')
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build y Push — translation-service
        uses: docker/build-push-action@v6
        with:
          context: ./services/translation_service
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak/translation-service:${{ env.IMAGE_TAG }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak/translation-service:latest

      - name: Obtener URL de vision-service
        id: vision-url
        run: |
          URL=$(gcloud run services describe vision-service \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "🔗 vision-service URL: ${URL}"

      - name: Deploy a Cloud Run — translation-service
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: translation-service
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak/translation-service:${{ env.IMAGE_TAG }}
          env_vars: |
            VISION_SERVICE_URL=${{ steps.vision-url.outputs.url }}
            ENVIRONMENT=production
          flags: |
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --allow-unauthenticated

      - name: Mostrar URL
        run: echo "✅ translation-service → ${{ steps.deploy.outputs.url }}"

  # =============================================================================
  # JOB 3c — Build y Deploy api-gateway
  # =============================================================================
  deploy-api-gateway:
    name: "🌐 Deploy api-gateway"
    runs-on: ubuntu-latest
    needs: [changes, auth, deploy-vision, deploy-translation]
    if: |
      always() && !cancelled() &&
      (needs.changes.outputs.api_gateway == 'true' ||
      github.event.inputs.service == 'api-gateway' ||
      github.event.inputs.service == 'all')
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build y Push — api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./services/api_gateway
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak/api-gateway:${{ env.IMAGE_TAG }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak/api-gateway:latest

      - name: Obtener URLs de servicios ya desplegados
        id: service-urls
        run: |
          VISION_URL=$(gcloud run services describe vision-service \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          TRANS_URL=$(gcloud run services describe translation-service \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "vision_url=${VISION_URL}" >> $GITHUB_OUTPUT
          echo "translation_url=${TRANS_URL}" >> $GITHUB_OUTPUT
          echo "🔗 vision: ${VISION_URL}"
          echo "🔗 translation: ${TRANS_URL}"

      - name: Deploy a Cloud Run — api-gateway
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: api-gateway
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/signspeak/api-gateway:${{ env.IMAGE_TAG }}
          env_vars: |
            VISION_SERVICE_URL=${{ steps.service-urls.outputs.vision_url }}
            TRANSLATION_SERVICE_URL=${{ steps.service-urls.outputs.translation_url }}
            ENVIRONMENT=production
            CORS_ORIGINS=*
          flags: |
            --memory=512Mi
            --cpu=1
            --min-instances=0
            --max-instances=10
            --allow-unauthenticated

      - name: Mostrar URL
        run: echo "✅ api-gateway → ${{ steps.deploy.outputs.url }}"

  # =============================================================================
  # JOB 4 — Smoke Tests
  # =============================================================================
  smoke-test:
    name: "🧪 Smoke Tests"
    runs-on: ubuntu-latest
    needs: [deploy-api-gateway]
    if: always() && needs.deploy-api-gateway.result == 'success'
    steps:
      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Obtener URL del api-gateway
        id: gateway-url
        run: |
          URL=$(gcloud run services describe api-gateway \
            --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Health check — api-gateway
        run: |
          BASE_URL="${{ steps.gateway-url.outputs.url }}"
          echo "🏥 Verificando ${BASE_URL}/api/v1/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${BASE_URL}/api/v1/health" || echo "000")
            echo "  Intento $i: HTTP $STATUS"
            if [[ "$STATUS" == "200" ]]; then
              echo "✅ Health check OK"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check falló"
          exit 1

  # =============================================================================
  # JOB 5 — Resumen final
  # =============================================================================
  summary:
    name: "📊 Resumen"
    runs-on: ubuntu-latest
    needs: [deploy-vision, deploy-translation, deploy-api-gateway, smoke-test]
    if: always()
    steps:
      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Resumen del despliegue
        run: |
          echo "## 🚀 Despliegue SignSpeak — GCP Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Servicio | Estado | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|-----|" >> $GITHUB_STEP_SUMMARY

          for SVC in vision-service translation-service api-gateway; do
            URL=$(gcloud run services describe $SVC \
              --region=${{ env.GCP_REGION }} --project=${{ env.GCP_PROJECT_ID }} \
              --format='value(status.url)' 2>/dev/null || echo "N/A")
            echo "| $SVC | ✅ | $URL |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Hora:** $(date -u)" >> $GITHUB_STEP_SUMMARY
