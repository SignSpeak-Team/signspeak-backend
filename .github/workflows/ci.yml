name: CI - Tests & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check . --output-format=github

      - name: Black
        run: black --check --diff .

      - name: Pylint
        run: |
          pylint services/api_gateway/src services/vision_service/src \
            --fail-under=7.0 \
            --disable=C0114,C0115,C0116 \
            || true

  test-api-gateway:
    name: Test API Gateway
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r services/api_gateway/requirements.txt

      - name: Run tests
        run: pytest tests/unit/api_gateway/ -v --tb=short --cov=services/api_gateway/src --cov-report=xml --cov-fail-under=70
        env:
          PYTHONPATH: ${{ github.workspace }}/services/api_gateway

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api-gateway
          path: coverage.xml
          retention-days: 7

  test-vision-service:
    name: Test Vision Service
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt numpy pytest pytest-asyncio
          pip install -r services/vision_service/requirements.txt

      - name: Run tests
        run: pytest tests/unit/vision_service/ -v --tb=short -m "not slow" --cov=services/vision_service/src --cov-report=xml
        env:
          PYTHONPATH: ${{ github.workspace }}/services/vision_service/src

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-vision-service
          path: coverage.xml
          retention-days: 7

  test-all:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: [code-quality, test-api-gateway, test-vision-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r services/api_gateway/requirements.txt
          pip install -r services/vision_service/requirements.txt

      - name: Run all tests with coverage
        run: |
          pytest tests/ -v \
            --cov=services --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
