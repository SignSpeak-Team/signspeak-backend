name: CI - Tests & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff (linting)
        run: ruff check . --output-format=github

      - name: Run black (formatting check)
        run: black --check --diff .

  test-api-gateway:
    name: Test API Gateway
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r services/api_gateway/requirements.txt

      - name: Run API Gateway tests
        run: pytest tests/unit/api_gateway/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/services/api_gateway

  test-translation-service:
    name: Test Translation Service
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r services/translation_service/requirements.txt

      - name: Run Translation Service tests
        run: pytest tests/unit/translation_service/ -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/services/translation_service/src

  test-vision-service:
    name: Test Vision Service
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lightweight dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install numpy pytest pytest-asyncio

      - name: Run Vision Service tests (non-slow)
        run: pytest tests/unit/vision_service/ -v --tb=short -m "not slow"
        env:
          PYTHONPATH: ${{ github.workspace }}/services/vision_service/src

  test-all:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: [code-quality, test-vision-service, test-api-gateway, test-translation-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install all dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r services/api_gateway/requirements.txt
          pip install -r services/translation_service/requirements.txt

      - name: Run all non-slow tests with coverage
        run: |
          pytest tests/unit/api_gateway/ tests/unit/translation_service/ -v \
            --cov=services --cov-report=xml --cov-report=term-missing
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
