name: CI - Tests & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      
      - name: Run ruff (linting)
        run: ruff check . --output-format=github
        continue-on-error: true
      
      - name: Run black (formatting check)
        run: black --check --diff .
        continue-on-error: true

  test-vision-service:
    name: Test Vision Service
    runs-on: ubuntu-latest
    needs: code-quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r services/vision_service/requirements.txt
      
      - name: Run Vision Service tests
        run: pytest tests/unit/test_vision_service.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/services/vision_service/src

  test-all:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: [code-quality, test-vision-service]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install all dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -r services/vision_service/requirements.txt
      
      - name: Run all tests with coverage
        run: |
          pytest tests/ -v --cov=services --cov-report=xml --cov-report=term-missing
        continue-on-error: true
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
